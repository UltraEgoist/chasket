<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Container/basket shape with angle brackets representing template-first -->
  <!-- Outer rounded container -->
  <rect x="4" y="3" width="24" height="20" rx="3" ry="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <!-- Left angle bracket < -->
  <path d="M13 8L8 13L13 18" stroke="#ea580c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right angle bracket > -->
  <path d="M19 8L24 13L19 18" stroke="#ea580c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Slash / in the middle -->
  <line x1="17" y1="7" x2="15" y2="19" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- .csk text -->
  <text x="16" y="29" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="5" font-weight="600" fill="#444444">.csk</text>
</svg>
